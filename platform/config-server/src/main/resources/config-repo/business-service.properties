server.port=8083
spring.application.name=business-service

spring.datasource.url=${BUSINESS_DATASOURCE_URL:jdbc:h2:mem:businessdb}
spring.datasource.username=${BUSINESS_DATASOURCE_USERNAME:sa}
spring.datasource.password=${BUSINESS_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${BUSINESS_DATASOURCE_DRIVER:org.h2.Driver}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.external-api.base-url=${EXTERNAL_API_BASE_URL:https://jsonplaceholder.typicode.com}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

springdoc.enable-data-rest=false
springdoc.enable-hateoas=false
