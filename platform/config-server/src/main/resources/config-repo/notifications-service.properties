server.port=8087
spring.application.name=notifications-service

spring.datasource.url=${NOTIFICATIONS_DATASOURCE_URL:jdbc:h2:mem:notificationsdb}
spring.datasource.username=${NOTIFICATIONS_DATASOURCE_USERNAME:sa}
spring.datasource.password=${NOTIFICATIONS_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${NOTIFICATIONS_DATASOURCE_DRIVER:org.h2.Driver}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.rabbit.enabled=false

springdoc.enable-data-rest=false
springdoc.enable-hateoas=false
