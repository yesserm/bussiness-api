server.port=8081
spring.application.name=auth-service

spring.datasource.url=${AUTH_DATASOURCE_URL:jdbc:h2:mem:authdb}
spring.datasource.username=${AUTH_DATASOURCE_USERNAME:sa}
spring.datasource.password=${AUTH_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${AUTH_DATASOURCE_DRIVER:org.h2.Driver}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

app.security.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
app.security.jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
app.security.jwt.secret=${JWT_SECRET:V2h5VGhpcklzVGhpcklzVGhpcklzVGhpcklzVGhpcklzVGhpcklzVGhpcklz}
app.security.admin-setup-key=${ADMIN_SETUP_KEY:V2h5VGhpcklzVGhpcklzVGhpcklzVGhpcklzVGhpcklzVGhpcklzVGhpcklz}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

springdoc.enable-data-rest=false
springdoc.enable-hateoas=false
