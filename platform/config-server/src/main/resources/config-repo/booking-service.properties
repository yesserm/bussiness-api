server.port=8086
spring.application.name=booking-service

spring.datasource.url=${BOOKING_DATASOURCE_URL:jdbc:h2:mem:bookingdb}
spring.datasource.username=${BOOKING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${BOOKING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${BOOKING_DATASOURCE_DRIVER:org.h2.Driver}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

springdoc.enable-data-rest=false
springdoc.enable-hateoas=false
