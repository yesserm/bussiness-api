server.port=8088
spring.application.name=orders-service

spring.datasource.url=${ORDERS_DATASOURCE_URL:jdbc:h2:mem:ordersdb}
spring.datasource.username=${ORDERS_DATASOURCE_USERNAME:sa}
spring.datasource.password=${ORDERS_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${ORDERS_DATASOURCE_DRIVER:org.h2.Driver}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

springdoc.enable-data-rest=false
springdoc.enable-hateoas=false
