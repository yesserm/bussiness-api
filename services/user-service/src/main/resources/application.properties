spring.application.name=user-service
spring.config.import=optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}

server.port=8082

spring.datasource.url=${USER_DATASOURCE_URL:jdbc:h2:mem:userdb}
spring.datasource.driver-class-name=${USER_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${USER_DATASOURCE_USERNAME:sa}
spring.datasource.password=${USER_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.security.jwt.secret=${JWT_SECRET:V2h5VGhpcklzVGhpcklzVGhpcklzVGhpcklzVGhpcklzVGhpcklzVGhpcklz}
app.security.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

springdoc.enable-data-rest=false
springdoc.enable-hateoas=false
