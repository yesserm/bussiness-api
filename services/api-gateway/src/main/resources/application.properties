spring.application.name=api-gateway
spring.config.import=optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}

server.port=8080

app.routes.auth-service-uri=${AUTH_SERVICE_URI:http://localhost:8081}
app.routes.user-service-uri=${USER_SERVICE_URI:http://localhost:8082}
app.routes.business-service-uri=${BUSINESS_SERVICE_URI:http://localhost:8083}

eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
