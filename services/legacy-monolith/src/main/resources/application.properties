spring.application.name=legacy-monolith
spring.config.import=optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}

server.port=${LEGACY_MONOLITH_PORT:8085}

spring.datasource.url=${LEGACY_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.driver-class-name=${LEGACY_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${LEGACY_DATASOURCE_USERNAME:sa}
spring.datasource.password=${LEGACY_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

app.security.jwt.secret=${JWT_SECRET:V2h5VGhpcklzVGhpcklzVGhpcklzVGhpcklzVGhpcklzVGhpcklzVGhpcklz}
app.security.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
app.security.jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
app.security.admin-setup-key=${ADMIN_SETUP_KEY:V2h5VGhpcklzVGhpcklzVGhpcklzVGhpcklzVGhpcklzVGhpcklzVGhpcklz}

app.external-api.base-url=${EXTERNAL_API_BASE_URL:https://jsonplaceholder.typicode.com}

eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

springdoc.enable-data-rest=false
springdoc.enable-hateoas=false
