spring.application.name=catalog-service
spring.config.import=optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}

server.port=8084

spring.datasource.url=${CATALOG_DATASOURCE_URL:jdbc:h2:mem:catalogdb}
spring.datasource.driver-class-name=${CATALOG_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${CATALOG_DATASOURCE_USERNAME:sa}
spring.datasource.password=${CATALOG_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

springdoc.enable-data-rest=false
springdoc.enable-hateoas=false
