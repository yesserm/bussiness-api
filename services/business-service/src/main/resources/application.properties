spring.application.name=business-service
spring.config.import=optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}

server.port=8083

spring.datasource.url=${BUSINESS_DATASOURCE_URL:jdbc:h2:mem:businessdb}
spring.datasource.driver-class-name=${BUSINESS_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${BUSINESS_DATASOURCE_USERNAME:sa}
spring.datasource.password=${BUSINESS_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.external-api.base-url=${EXTERNAL_API_BASE_URL:https://jsonplaceholder.typicode.com}

eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

springdoc.enable-data-rest=false
springdoc.enable-hateoas=false
